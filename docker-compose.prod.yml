name: mindecho_prod
version: "3.9"

services:
  db-init:
    image: mindecho_backend:prod
    build:
      context: .
      target: prod # 使用正式版構建
    container_name: mindecho_db_init_prod
    env_file: .env
    environment:
      - NODE_ENV=production # 正式環境模式
      - DATABASE_URL=postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    # 改用 migrate deploy + seed，避免重複插入（seed 內含 ON CONFLICT）
    # NOTE: passing args here makes scripts/entrypoint-prod.sh `exec` them
    # directly, bypassing the log-rotator pipeline that the backend uses.
    command:
      - sh
      - -c
      - "npx prisma migrate deploy && (npx prisma db execute --schema prisma --file prisma/seed_scales.sql || echo 'Seed skipped (data already exists)')"
    restart: "no"

  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: mindecho_inference_prod
    env_file: .env
    environment:
      - INFERENCE_PORT=6001
      - INFERENCE_WORKERS=4
      # Per-worker cap on concurrent outbound LLM calls (Phase 2.2 backpressure).
      # Effective ceiling = MAX_CONCURRENT_LLM_CALLS * INFERENCE_WORKERS.
      - MAX_CONCURRENT_LLM_CALLS=20
    expose:
      - "6001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:6001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always

  backend:
    build:
      context: .
      target: prod # 使用正式版構建
    image: mindecho_backend:prod
    container_name: mindecho_backend_prod
    env_file: .env
    environment:
      - NODE_ENV=production # 正式環境模式
      - DATABASE_URL=postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE}?schema=public
      - INFERENCE_SERVICE_URL=http://inference:6001
      - LOG_DIR=/app/logs
      - DISCORD_ALERT_WEBHOOK_URL=${DISCORD_ALERT_WEBHOOK_URL:-}
      - ADMIN_USERNAMES=${ADMIN_USERNAMES:-}
    # NOTE: command intentionally omitted — Dockerfile ENTRYPOINT
    # (scripts/entrypoint-prod.sh) wraps `node src/server.js` so stdout/stderr
    # is tee'd into ./logs/backend-prod/ via scripts/log-rotator.js.
    expose:
      - "8443"
    volumes:
      # Phase 1 — host-mounted, daily-rotated, 7-day-retained backend logs.
      - ./logs/backend-prod:/app/logs
    # Phase 1 — Docker's own json-file driver as an independent safety net
    # (size-bound rotation for `docker logs`, separate from the file-based logs).
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "7"
    networks:
      default:
        aliases:
          - backend-prod
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      inference:
        condition: service_healthy
    healthcheck:
      # prod: https on 8443 (self-signed in container, terminated by nginx upstream)
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:' + (process.env.PROD_PORT || 8443) + '/api/alive').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: mindecho_postgres_prod
    env_file: .env
    environment:
      - POSTGRES_DB=${PG_DATABASE}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    # 移除 ports，保護資料庫不被外網掃描
    ports:
      - "5432:5432" # host 5432 -> container 5432
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data # 建議改個名字區分 dev/prod data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${PG_USER} -d $${PG_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always

  nginx:
    image: nginx:latest
    container_name: mindecho_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      #- ./certs-mock:/etc/letsencrypt:ro
      - ./test-frontend/dist:/usr/share/nginx/html/testWebpage/chatbot:ro

    depends_on:
      backend:
        condition: service_healthy
    restart: always

    networks:
      - default
      - dev_net # 連接到 dev_net 以便讓 dev 跟開發環境的 nginx 共用設定

volumes:
  postgres_data_prod: # 改名以防與開發資料混淆

networks:
  default: {}
  dev_net:
    external: true
    name: mindecho_dev_default

name: mindecho_dev
version: "3.9"

services:
  db-init:
    image: mindecho_backend:dev
    build:
      context: .
      target: dev
    container_name: mindecho_db_init_dev
    env_file: .env
    environment:
      - NODE_ENV=development
      - PG_HOST=postgres
      - PG_PORT=5432
      - DATABASE_URL=postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --schema prisma --accept-data-loss && (npx prisma db execute --schema prisma --file prisma/seed_scales.sql || echo 'Seed skipped (data already exists)')"
    restart: "no"

  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: mindecho_inference_dev
    env_file: .env
    environment:
      - INFERENCE_PORT=6001
    expose:
      - "6001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:6001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always

  backend:
    build:
      context: .
      target: dev
    image: mindecho_backend:dev
    container_name: mindecho_backend_dev
    env_file: .env
    environment:
      - NODE_ENV=development
      - PG_HOST=postgres
      - PG_PORT=5432
      - DATABASE_URL=postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE}?schema=public
      - INFERENCE_SERVICE_URL=http://inference:6001
    command: >
      sh -c "node src/server.js"
    expose:
      - "8442"
    networks:
      default:
        aliases:
          - backend-dev
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      inference:
        condition: service_healthy
    healthcheck:
      # dev: https on 8442 (self-signed cert, so disable TLS verification)
      test:
        [
          "CMD-SHELL",
          "NODE_TLS_REJECT_UNAUTHORIZED=0 node -e \"fetch('https://localhost:8442/api/alive').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: mindecho_postgres_dev
    env_file: .env
    environment:
      - POSTGRES_DB=${PG_DATABASE}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    ports:
      - "5433:5432" # host 5433 -> container 5432
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${PG_USER} -d $${PG_DATABASE} -h localhost -p 5432",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: always

  nginx:
    image: nginx:latest
    container_name: mindecho_nginx_dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 掛載 nginx 設定
      - ./nginx:/etc/nginx:ro
      # 假憑證與 letsencrypt 設定檔（本地測試）
      - ./certs-mock:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    profiles: ["disabled"] # 這樣 dev up 時不會啟動

volumes:
  postgres_data_dev:
